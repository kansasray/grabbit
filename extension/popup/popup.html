<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="grabbit-popup">
    <header>
      <h1>Grabbit</h1>
      <span class="version">v0.1.0</span>
    </header>

    <div id="queue-container">
      <p class="empty-state">No recent downloads</p>

    <div class="actions">
      <button id="clear-btn" class="action-btn" style="display:none">Clear finished</button>
    </div>

    <footer>
      <a href="#" id="options-link">Settings</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
