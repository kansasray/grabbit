<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="grabbit-popup">
    <header>
      <h1>Grabbit</h1>
      <span class="version">v0.1.0</span>
    </header>

    <div id="url-form">
      <input type="text" id="url-input" placeholder="Paste Facebook / YouTube URL…" spellcheck="false">
      <input type="text" id="filename-input" placeholder="Filename (optional)" spellcheck="false" style="margin-top:6px">
      <div class="form-row">
        <select id="format-select">
          <option value="best">Best quality</option>
          <option value="1080p">1080p</option>
          <option value="720p">720p</option>
          <option value="bestaudio">Audio only</option>
        </select>
        <button id="dl-btn" class="primary-btn">Download</button>
      </div>
      <div id="form-error" class="form-error" style="display:none"></div>
    </div>

    <div id="queue-container">
      <p class="empty-state">No recent downloads</p>
    </div>

    <div class="actions">
      <button id="clear-btn" class="action-btn" style="display:none">Clear finished</button>
    </div>

    <footer>
      <a href="#" id="options-link">Settings</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
